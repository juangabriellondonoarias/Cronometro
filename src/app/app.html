<div class="contenedor">

  <div class="tarjeta-cronometro">
    <h3>Mi cronómetro observable Frio</h3>
    <div class="display-numero">{{ tiempoActual }}</div>
    
    <div class="fila-botones">
      <button class="btn" (click)="empezar()" [disabled]="estaCorriendo">empezar</button>
      <button class="btn" (click)="reiniciar()">reiniciar</button>
    </div>
  </div>

  <button class="btn-entregar" (click)="entregar()">entregar</button>
  
  <p class="mensaje-final" *ngIf="mensajeFinal">
    {{ mensajeFinal }}
  </p>
</div>
